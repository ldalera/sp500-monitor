name: Scan diario S&P 500

on:
  schedule:
    # 22:30 UTC ≈ 18:30/19:30 ART, siempre después del cierre de NY (16:00 ET)
    - cron: '30 22 * * 1-5'
  workflow_dispatch: {}   # permite correrlo a mano desde la web o la app de GitHub

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      TZ: America/Argentina/Buenos_Aires
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Correr scan
        run: python monitor.py

      - name: Guardar histórico del scan en el repo
        run: |
          git config user.name "sp500-monitor-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/ || true
          git commit -m "scan $(date +%F)" || echo "sin cambios que guardar"
          git push || true

      - name: Preparar sitio
        run: mkdir -p public && cp dashboard.html public/index.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Publicar en GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
